<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="ball1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="ball2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Hybnost – základní princip</text>
  
  <!-- Formula -->
  <rect x="260" y="55" width="280" height="45" rx="12" fill="#1e3a8a" opacity="0.1"/>
  <text x="400" y="85" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">p⃗ = m · v⃗</text>
  
  <!-- Left: Heavy slow object -->
  <g transform="translate(150,220)">
    <circle r="60" fill="url(#ball1)" opacity="0.9"/>
    <text y="5" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" font-weight="700" fill="white">m = 10 kg</text>
    <text y="25" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="white" opacity="0.8">v = 2 m/s</text>
    <!-- Arrow -->
    <line x1="65" y1="0" x2="130" y2="0" stroke="#1e3a8a" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <text x="97" y="-12" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">v⃗</text>
  </g>
  
  <!-- Right: Light fast object -->
  <g transform="translate(550,220)">
    <circle r="35" fill="url(#ball2)" opacity="0.9"/>
    <text y="5" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="white">m = 1 kg</text>
    <text y="22" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="white" opacity="0.8">v = 20 m/s</text>
    <!-- Arrow -->
    <line x1="40" y1="0" x2="140" y2="0" stroke="#991b1b" stroke-width="4" marker-end="url(#arrowRed)"/>
    <text x="90" y="-12" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#991b1b">v⃗</text>
  </g>
  
  <!-- Labels below -->
  <rect x="60" y="300" width="180" height="55" rx="10" fill="#3b82f6" opacity="0.12"/>
  <text x="150" y="322" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">p = 10 · 2</text>
  <text x="150" y="345" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" font-weight="700" fill="#3b82f6">p = 20 kg·m/s</text>
  
  <rect x="460" y="300" width="180" height="55" rx="10" fill="#ef4444" opacity="0.12"/>
  <text x="550" y="322" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#991b1b">p = 1 · 20</text>
  <text x="550" y="345" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="18" font-weight="700" fill="#ef4444">p = 20 kg·m/s</text>
  
  <!-- Equals sign -->
  <text x="400" y="335" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="36" font-weight="700" fill="#059669">=</text>
  
  <text x="400" y="385" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#64748b">Obě tělesa mají stejnou hybnost, i když se liší hmotností i rychlostí!</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e3a8a"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#991b1b"/>
    </marker>
  </defs>
</svg>
