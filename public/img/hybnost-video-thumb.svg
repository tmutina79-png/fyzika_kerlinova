<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  
  <!-- Play button overlay -->
  <circle cx="200" cy="135" r="40" fill="rgba(59,130,246,0.25)" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="188,115 188,155 220,135" fill="#60a5fa"/>
  
  <!-- Ball tracks -->
  <circle cx="120" cy="135" r="18" fill="#3b82f6" opacity="0.4"/>
  <circle cx="280" cy="135" r="14" fill="#ef4444" opacity="0.4"/>
  
  <!-- Arrow -->
  <line x1="142" y1="135" x2="260" y2="135" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  
  <text x="200" y="210" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">▶ Srážka dvou těles</text>
  <text x="200" y="235" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#94a3b8">Vizualizace zákona zachování hybnosti</text>
  <text x="200" y="260" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#60a5fa">Klikni pro přehrání animace</text>
</svg>
