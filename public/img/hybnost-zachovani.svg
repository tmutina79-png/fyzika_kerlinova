<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" rx="16" fill="url(#bg)"/>
  
  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="22" font-weight="700" fill="#065f46">Zákon zachování hybnosti</text>
  
  <!-- Before collision -->
  <text x="200" y="70" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#065f46">PŘED srážkou</text>
  
  <!-- Ball A -->
  <circle cx="120" cy="140" r="30" fill="#3b82f6"/>
  <text x="120" y="145" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="white">A</text>
  <text x="120" y="185" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#1e3a8a">m₁=2 kg, v₁=3 m/s</text>
  <!-- Arrow -->
  <line x1="155" y1="140" x2="210" y2="140" stroke="#1e3a8a" stroke-width="3" marker-end="url(#arrB)"/>
  
  <!-- Ball B -->
  <circle cx="280" cy="140" r="25" fill="#ef4444"/>
  <text x="280" y="145" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="white">B</text>
  <text x="280" y="185" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#991b1b">m₂=1 kg, v₂=0 m/s</text>
  
  <!-- Arrow between -->
  <text x="400" y="140" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="36" fill="#065f46">→</text>
  
  <!-- After collision -->
  <text x="600" y="70" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#065f46">PO srážce</text>
  
  <!-- Ball A after -->
  <circle cx="520" cy="140" r="30" fill="#3b82f6" opacity="0.7"/>
  <text x="520" y="145" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="white">A</text>
  <text x="520" y="185" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#1e3a8a">v₁'= 1 m/s</text>
  <line x1="555" y1="140" x2="585" y2="140" stroke="#1e3a8a" stroke-width="3" marker-end="url(#arrB)"/>
  
  <!-- Ball B after -->
  <circle cx="680" cy="140" r="25" fill="#ef4444" opacity="0.7"/>
  <text x="680" y="145" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="white">B</text>
  <text x="680" y="185" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#991b1b">v₂'= 4 m/s</text>
  <line x1="710" y1="140" x2="760" y2="140" stroke="#991b1b" stroke-width="3" marker-end="url(#arrR)"/>
  
  <!-- Calculation box -->
  <rect x="100" y="210" width="600" height="150" rx="14" fill="white" opacity="0.85" stroke="#059669" stroke-width="2"/>
  
  <text x="400" y="240" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#065f46">Ověření zákona zachování hybnosti:</text>
  
  <text x="200" y="270" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#1e3a8a" font-weight="600">PŘED:</text>
  <text x="200" y="295" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" fill="#334155">p = m₁·v₁ + m₂·v₂</text>
  <text x="200" y="315" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" fill="#334155">p = 2·3 + 1·0 = 6 kg·m/s</text>
  
  <text x="400" y="295" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#059669">=</text>
  
  <text x="600" y="270" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#991b1b" font-weight="600">PO:</text>
  <text x="600" y="295" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" fill="#334155">p' = m₁·v₁' + m₂·v₂'</text>
  <text x="600" y="315" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="13" fill="#334155">p' = 2·1 + 1·4 = 6 kg·m/s</text>
  
  <text x="400" y="348" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#059669">✅ Celková hybnost se zachovává: p = p' = 6 kg·m/s</text>
  
  <defs>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e3a8a"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#991b1b"/>
    </marker>
  </defs>
</svg>
