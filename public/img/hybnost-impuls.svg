<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" rx="16" fill="url(#bg)"/>
  
  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="22" font-weight="700" fill="#831843">Impuls síly a změna hybnosti</text>
  
  <!-- Formula banner -->
  <rect x="220" y="50" width="360" height="40" rx="10" fill="#831843" opacity="0.1"/>
  <text x="400" y="78" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="24" font-weight="700" fill="#831843">F⃗ · Δt = Δp⃗ = m · Δv⃗</text>
  
  <!-- Left: Short time, big force -->
  <g transform="translate(30,110)">
    <rect width="350" height="210" rx="14" fill="white" opacity="0.8" stroke="#be185d" stroke-width="1.5"/>
    <text x="175" y="30" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#831843">Krátký čas → velká síla</text>
    <text x="175" y="55" text-anchor="middle" font-size="40">🥊</text>
    
    <!-- Force-time graph -->
    <rect x="30" y="70" width="290" height="110" rx="8" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1"/>
    <text x="175" y="86" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#9d174d" font-weight="600">Graf F(t) – úder pěstí</text>
    
    <!-- Axes -->
    <line x1="60" y1="165" x2="300" y2="165" stroke="#6b7280" stroke-width="1.5"/>
    <line x1="60" y1="165" x2="60" y2="95" stroke="#6b7280" stroke-width="1.5"/>
    <text x="300" y="163" font-family="Segoe UI,sans-serif" font-size="10" fill="#6b7280">t</text>
    <text x="55" y="98" font-family="Segoe UI,sans-serif" font-size="10" fill="#6b7280">F</text>
    
    <!-- Tall narrow pulse -->
    <polygon points="130,165 140,100 150,100 160,165" fill="#be185d" opacity="0.4"/>
    <line x1="130" y1="165" x2="140" y2="100" stroke="#be185d" stroke-width="2"/>
    <line x1="140" y1="100" x2="150" y2="100" stroke="#be185d" stroke-width="2"/>
    <line x1="150" y1="100" x2="160" y2="165" stroke="#be185d" stroke-width="2"/>
    
    <text x="145" y="92" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="10" fill="#be185d" font-weight="600">F velká</text>
    <text x="145" y="180" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="10" fill="#be185d">Δt malé</text>
    
    <text x="175" y="200" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#831843" font-weight="600">Bolí to! Velká síla při nárazu.</text>
  </g>
  
  <!-- Right: Long time, small force -->
  <g transform="translate(420,110)">
    <rect width="350" height="210" rx="14" fill="white" opacity="0.8" stroke="#be185d" stroke-width="1.5"/>
    <text x="175" y="30" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#831843">Dlouhý čas → malá síla</text>
    <text x="175" y="55" text-anchor="middle" font-size="40">🛡️</text>
    
    <!-- Force-time graph -->
    <rect x="30" y="70" width="290" height="110" rx="8" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1"/>
    <text x="175" y="86" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" fill="#9d174d" font-weight="600">Graf F(t) – airbag</text>
    
    <!-- Axes -->
    <line x1="60" y1="165" x2="300" y2="165" stroke="#6b7280" stroke-width="1.5"/>
    <line x1="60" y1="165" x2="60" y2="95" stroke="#6b7280" stroke-width="1.5"/>
    <text x="300" y="163" font-family="Segoe UI,sans-serif" font-size="10" fill="#6b7280">t</text>
    <text x="55" y="98" font-family="Segoe UI,sans-serif" font-size="10" fill="#6b7280">F</text>
    
    <!-- Wide low pulse -->
    <polygon points="90,165 110,140 200,140 220,165" fill="#059669" opacity="0.3"/>
    <line x1="90" y1="165" x2="110" y2="140" stroke="#059669" stroke-width="2"/>
    <line x1="110" y1="140" x2="200" y2="140" stroke="#059669" stroke-width="2"/>
    <line x1="200" y1="140" x2="220" y2="165" stroke="#059669" stroke-width="2"/>
    
    <text x="155" y="134" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="10" fill="#059669" font-weight="600">F malá</text>
    <text x="155" y="180" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="10" fill="#059669">Δt velké</text>
    
    <text x="175" y="200" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#831843" font-weight="600">Bezpečné! Airbag zmírní náraz.</text>
  </g>
  
  <text x="400" y="340" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" fill="#831843" font-weight="600">Plocha pod grafem F(t) = impuls = změna hybnosti → obě plochy jsou stejné!</text>
</svg>
